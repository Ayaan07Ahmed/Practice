<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    :root {
      --accent: #0a66c2;
      --banner-start: #0a66c2;
      --banner-end: #378fe9;
      --page-bg: #f3f2ef;
      --card-bg: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #5f6368;
      --text-muted: #8a8d91;
      --border: rgba(0, 0, 0, 0.08);
      --hover-bg: rgba(0, 0, 0, 0.03);
      --danger: #c0392b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 560px;
      margin: 2.5rem auto;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 0 0 1px var(--border), 0 2px 4px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .banner {
      height: 72px;
      background: linear-gradient(135deg, var(--banner-start) 0%, var(--banner-end) 100%);
    }

    .todo {
      padding: 1.75rem 2rem 2rem;
    }

    .todo__title {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .todo__subtitle {
      margin: 0.25rem 0 1.5rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .todo__form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .todo__input {
      flex: 1;
      min-width: 0;
      padding: 0.625rem 0.875rem;
      font: inherit;
      color: var(--text-primary);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .todo__input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.15);
    }

    .todo__add {
      padding: 0.625rem 1.25rem;
      font: inherit;
      font-weight: 600;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    .todo__add:hover { filter: brightness(1.05); }
    .todo__add:active { filter: brightness(0.95); }
    .todo__add:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .todo__list {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--border);
    }

    .todo__list[data-empty="true"] { display: none; }

    .todo__item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.25rem;
      border-bottom: 1px solid var(--border);
    }

    .todo__check {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .todo__text {
      flex: 1;
      min-width: 0;
      font-size: 1rem;
      color: var(--text-primary);
      word-break: break-word;
    }

    .todo__item--done .todo__text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo__delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .todo__delete:hover {
      background: var(--hover-bg);
      color: var(--danger);
    }

    .todo__delete:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .todo__empty {
      margin: 0;
      padding: 2rem 0.25rem;
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    .todo__empty[data-hidden="true"] { display: none; }

    @media (max-width: 600px) {
      .card { margin: 0; border-radius: 0; }
      .todo { padding: 1.25rem; }
      .banner { height: 56px; }
      .todo__title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="banner" aria-hidden="true"></div>
    <section class="todo">
      <h1 class="todo__title">To-Do</h1>
      <p class="todo__subtitle">Add tasks below. They'll be saved in your browser.</p>

      <form class="todo__form" id="todoForm" autocomplete="off">
        <input
          type="text"
          class="todo__input"
          id="todoInput"
          placeholder="What needs doing?"
          aria-label="New task"
          maxlength="200"
        />
        <button type="submit" class="todo__add">Add</button>
      </form>

      <ul class="todo__list" id="todoList" aria-live="polite"></ul>
      <p class="todo__empty" id="todoEmpty">No tasks yet &mdash; add one above.</p>
    </section>
  </main>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'exercise3.todos';

      var form = document.getElementById('todoForm');
      var input = document.getElementById('todoInput');
      var list = document.getElementById('todoList');
      var empty = document.getElementById('todoEmpty');

      var todos = load();

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) { return []; }
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }

      function makeId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }
        return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
      }

      function render() {
        list.innerHTML = '';
        todos.forEach(function (todo) {
          var li = document.createElement('li');
          li.className = 'todo__item' + (todo.done ? ' todo__item--done' : '');
          li.dataset.id = todo.id;

          var check = document.createElement('input');
          check.type = 'checkbox';
          check.className = 'todo__check';
          check.checked = !!todo.done;
          check.setAttribute('aria-label', 'Mark "' + todo.text + '" as done');

          var text = document.createElement('span');
          text.className = 'todo__text';
          text.textContent = todo.text;

          var del = document.createElement('button');
          del.type = 'button';
          del.className = 'todo__delete';
          del.setAttribute('aria-label', 'Delete "' + todo.text + '"');
          del.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M9 3a1 1 0 0 0-1 1v1H4a1 1 0 1 0 0 2h1v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7h1a1 1 0 1 0 0-2h-4V4a1 1 0 0 0-1-1H9Zm1 4h2v11h-2V7Zm-3 0h1v11H7V7Zm6 0h1v11h-1V7Z"/></svg>';

          li.appendChild(check);
          li.appendChild(text);
          li.appendChild(del);
          list.appendChild(li);
        });

        var isEmpty = todos.length === 0;
        list.setAttribute('data-empty', isEmpty ? 'true' : 'false');
        empty.setAttribute('data-hidden', isEmpty ? 'false' : 'true');
      }

      function add(text) {
        var trimmed = text.trim();
        if (!trimmed) { return; }
        todos.push({ id: makeId(), text: trimmed, done: false });
        save();
        render();
      }

      function toggle(id) {
        for (var i = 0; i < todos.length; i++) {
          if (todos[i].id === id) {
            todos[i].done = !todos[i].done;
            break;
          }
        }
        save();
        render();
      }

      function remove(id) {
        todos = todos.filter(function (t) { return t.id !== id; });
        save();
        render();
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        add(input.value);
        input.value = '';
        input.focus();
      });

      list.addEventListener('change', function (e) {
        var target = e.target;
        if (target && target.classList.contains('todo__check')) {
          var li = target.closest('.todo__item');
          if (li) { toggle(li.dataset.id); }
        }
      });

      list.addEventListener('click', function (e) {
        var btn = e.target.closest('.todo__delete');
        if (!btn) { return; }
        var li = btn.closest('.todo__item');
        if (li) { remove(li.dataset.id); }
      });

      render();
    })();
  </script>
</body>
</html>
